<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background tile -->
  <rect x="0" y="0" width="128" height="128" rx="22" fill="#1a1a2e"/>

  <!-- Keycap (3D illusion via two layered rects) -->
  <rect x="20" y="22" width="88" height="88" rx="14" fill="#2a2a4a"/>
  <rect x="20" y="22" width="88" height="82" rx="14" fill="#1e1e2e" stroke="#5a5a78" stroke-width="2.5"/>

  <!-- Active char: Ukrainian Ф (large, accent color) -->
  <text x="64" y="86" text-anchor="middle"
        font-family="Segoe UI, system-ui, sans-serif" font-size="64" font-weight="700"
        fill="#7ec8e3">Ф</text>

  <!-- Inactive char: English A (smaller, muted, top-right corner) -->
  <text x="93" y="46" text-anchor="middle"
        font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="500"
        fill="#9aa">A</text>
</svg>
