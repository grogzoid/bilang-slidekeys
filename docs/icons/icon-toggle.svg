<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background tile -->
  <rect x="0" y="0" width="128" height="128" rx="22" fill="#1a1a2e"/>

  <!-- Back keycap (English A, faded, behind & up-left) -->
  <g transform="rotate(-6 50 56)">
    <rect x="14" y="22" width="68" height="68" rx="11" fill="#28283e" stroke="#444" stroke-width="2"/>
    <text x="48" y="74" text-anchor="middle"
          font-family="Segoe UI, system-ui, sans-serif" font-size="46" font-weight="700"
          fill="#88a">A</text>
  </g>

  <!-- Front keycap (Ukrainian Ф, accent, in front & down-right) -->
  <g transform="rotate(6 78 72)">
    <rect x="46" y="38" width="68" height="68" rx="11" fill="#1e1e2e" stroke="#7ec8e3" stroke-width="2.5"/>
    <text x="80" y="89" text-anchor="middle"
          font-family="Segoe UI, system-ui, sans-serif" font-size="50" font-weight="700"
          fill="#7ec8e3">Ф</text>
  </g>
</svg>
