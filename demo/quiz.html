<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukrainian A1 — Translation Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 16px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #7ec8e3;
      margin: 0 0 4px;
      font-size: 28px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .quiz-container {
      max-width: 640px;
      margin: 0 auto;
    }

    .exercise {
      background: #16162a;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .exercise-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .exercise-number {
      color: #7ec8e3;
      font-weight: 700;
      font-size: 14px;
      min-width: 28px;
    }

    .english-phrase {
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 18px;
      color: #fff;
      font-weight: 500;
      display: inline-block;
    }

    .answer-input {
      width: 100%;
      margin-top: 10px;
      padding: 10px 14px;
      background: #111;
      color: #e0e0e0;
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }

    .answer-input:focus {
      border-color: #555;
    }

    .answer-input.correct {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.06);
    }

    .answer-input.incorrect {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.06);
    }

    .correction {
      display: none;
      margin-top: 6px;
      font-size: 14px;
      color: #f87171;
    }

    .correction.visible {
      display: block;
    }

    .correction span {
      color: #4ade80;
      font-weight: 500;
    }

    .quiz-footer {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 24px;
      padding: 16px 20px;
      background: #16162a;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
    }

    .show-corrections-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #aaa;
    }

    .show-corrections-label input {
      accent-color: #7ec8e3;
      width: 16px;
      height: 16px;
    }

    .livetype-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #aaa;
    }

    .livetype-toggle input {
      accent-color: #7ec8e3;
      width: 16px;
      height: 16px;
    }

    .livetype-indicator {
      display: none;
      font-size: 13px;
      color: #7ec8e3;
      background: rgba(126, 200, 227, 0.1);
      border: 1px solid rgba(126, 200, 227, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
    }

    .livetype-indicator.visible {
      display: inline-block;
    }

    .btn {
      padding: 10px 28px;
      border: 2px solid #7ec8e3;
      background: transparent;
      color: #7ec8e3;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: #7ec8e3;
      color: #0d0d1a;
    }

    .btn.submit {
      margin-left: auto;
    }

    .btn.try-again {
      display: none;
      border-color: #f59e0b;
      color: #f59e0b;
    }

    .btn.try-again:hover {
      background: #f59e0b;
      color: #0d0d1a;
    }

    .btn.try-again.visible {
      display: inline-block;
    }

    .score {
      display: none;
      font-size: 22px;
      font-weight: 700;
      color: #4ade80;
    }

    .score.visible {
      display: block;
    }

    .score.low {
      color: #f87171;
    }

    .score.mid {
      color: #f59e0b;
    }
  </style>
</head>
<body>

  <h1>Ukrainian A1 -- Translation Quiz</h1>
  <p class="subtitle">Translate each English phrase into Ukrainian. Use the on-screen keyboard below.</p>

  <div class="quiz-container" id="quiz-container"></div>

  <div class="quiz-footer" id="quiz-footer">
    <label class="show-corrections-label">
      <input type="checkbox" id="show-corrections" checked>
      Show corrections
    </label>
    <label class="livetype-toggle">
      <input type="checkbox" id="livetype-toggle">
      LiveType mode
    </label>
    <span class="livetype-indicator" id="livetype-indicator">&#9000;&#65039; LiveType: Physical keyboard &rarr; Ukrainian</span>
    <span class="score" id="score-display"></span>
    <button class="btn try-again" id="try-again-btn">Try Again</button>
    <button class="btn submit" id="submit-btn">Submit All</button>
  </div>

  <bilingual-keyboard active-lang="uk" input-mode="bound"></bilingual-keyboard>

  <script type="module">
    import '../src/bilingual-keyboard.js';

    const exercises = [
      {
        en: 'Hello',
        answers: ['привіт'],
      },
      {
        en: 'Good morning',
        answers: ['доброго ранку', 'добрий ранок'],
      },
      {
        en: 'My name is...',
        answers: ['мене звати...', 'мене звати', 'мене звати …'],
      },
      {
        en: 'How are you?',
        answers: ['як справи?', 'як справи'],
      },
      {
        en: 'Thank you',
        answers: ['дякую'],
      },
      {
        en: 'Yes',
        answers: ['так'],
      },
      {
        en: 'No',
        answers: ['ні'],
      },
      {
        en: 'Please',
        answers: ['будь ласка'],
      },
      {
        en: "I don't understand",
        answers: ['я не розумію'],
      },
      {
        en: 'Goodbye',
        answers: ['до побачення'],
      },
    ];

    const container = document.getElementById('quiz-container');
    const submitBtn = document.getElementById('submit-btn');
    const tryAgainBtn = document.getElementById('try-again-btn');
    const showCorrectionsCheckbox = document.getElementById('show-corrections');
    const scoreDisplay = document.getElementById('score-display');

    // Build exercises
    exercises.forEach((ex, i) => {
      const div = document.createElement('div');
      div.className = 'exercise';
      div.innerHTML = `
        <div class="exercise-header">
          <span class="exercise-number">#${i + 1}</span>
          <span class="english-phrase">${ex.en}</span>
        </div>
        <input class="answer-input" data-index="${i}" type="text" placeholder="Type Ukrainian translation..." autocomplete="off">
        <div class="correction" data-index="${i}">Correct answer: <span>${ex.answers[0]}</span></div>
      `;
      container.appendChild(div);
    });

    function normalize(s) {
      return s.trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function checkAnswers() {
      let correct = 0;
      const showCorr = showCorrectionsCheckbox.checked;

      exercises.forEach((ex, i) => {
        const input = document.querySelector(`.answer-input[data-index="${i}"]`);
        const correction = document.querySelector(`.correction[data-index="${i}"]`);
        const userAnswer = normalize(input.value);
        const isCorrect = ex.answers.some(a => normalize(a) === userAnswer);

        input.classList.remove('correct', 'incorrect');
        correction.classList.remove('visible');

        if (isCorrect) {
          input.classList.add('correct');
          correct++;
        } else {
          input.classList.add('incorrect');
          if (showCorr) {
            correction.classList.add('visible');
          }
        }
      });

      scoreDisplay.textContent = `${correct}/${exercises.length}`;
      scoreDisplay.classList.add('visible');
      scoreDisplay.classList.remove('low', 'mid');
      if (correct <= 3) scoreDisplay.classList.add('low');
      else if (correct <= 7) scoreDisplay.classList.add('mid');

      tryAgainBtn.classList.add('visible');
      submitBtn.textContent = 'Recheck';
    }

    function resetQuiz() {
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('correct', 'incorrect');
      });
      document.querySelectorAll('.correction').forEach(c => c.classList.remove('visible'));
      scoreDisplay.classList.remove('visible');
      tryAgainBtn.classList.remove('visible');
      submitBtn.textContent = 'Submit All';
      // Focus first input
      const first = document.querySelector('.answer-input[data-index="0"]');
      if (first) first.focus();
    }

    submitBtn.addEventListener('click', checkAnswers);
    tryAgainBtn.addEventListener('click', resetQuiz);

    // LiveType mode toggle
    const liveTypeToggle = document.getElementById('livetype-toggle');
    const liveTypeIndicator = document.getElementById('livetype-indicator');
    const kb = document.querySelector('bilingual-keyboard');

    liveTypeToggle.addEventListener('change', () => {
      if (liveTypeToggle.checked) {
        kb.setAttribute('input-mode', 'live-type');
        liveTypeIndicator.classList.add('visible');
      } else {
        kb.setAttribute('input-mode', 'bound');
        liveTypeIndicator.classList.remove('visible');
      }
    });

    // Toggle corrections visibility after submit
    showCorrectionsCheckbox.addEventListener('change', () => {
      const showCorr = showCorrectionsCheckbox.checked;
      document.querySelectorAll('.answer-input.incorrect').forEach(input => {
        const i = input.dataset.index;
        const correction = document.querySelector(`.correction[data-index="${i}"]`);
        if (showCorr) correction.classList.add('visible');
        else correction.classList.remove('visible');
      });
    });
  </script>

</body>
</html>
