<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilingual Keyboard Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #7ec8e3;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .controls {
      max-width: 600px;
      margin: 0 auto 24px;
      background: #16162a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
    }

    .controls h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #aaa;
      font-weight: 500;
    }

    .radio-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      transition: border-color 0.2s, background 0.2s;
    }

    .radio-group label:hover {
      border-color: #555;
      background: #1e1e2e;
    }

    .radio-group input[type="radio"] {
      accent-color: #7ec8e3;
    }

    .radio-group input[type="radio"]:checked + span {
      color: #7ec8e3;
    }

    .demo-inputs {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .demo-inputs label {
      font-size: 14px;
      color: #888;
      margin-bottom: 4px;
      display: block;
    }

    .demo-inputs input,
    .demo-inputs textarea {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      color: #e0e0e0;
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .demo-inputs input:focus,
    .demo-inputs textarea:focus {
      border-color: #555;
    }

    .demo-inputs textarea {
      min-height: 100px;
      resize: vertical;
    }

    .event-log {
      max-width: 600px;
      margin: 24px auto 0;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      color: #888;
      max-height: 160px;
      overflow-y: auto;
    }

    .event-log .entry {
      margin-bottom: 2px;
    }

    .event-log .entry .evt-name {
      color: #7ec8e3;
    }

    .event-log .entry .evt-data {
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>Bilingual Keyboard</h1>
  <p class="subtitle">English / Ukrainian on-screen keyboard web component</p>

  <div class="controls">
    <h2>Input Mode</h2>
    <div class="radio-group">
      <label>
        <input type="radio" name="input-mode" value="bound" checked>
        <span>Bound</span>
      </label>
      <label>
        <input type="radio" name="input-mode" value="focus">
        <span>Focus</span>
      </label>
      <label>
        <input type="radio" name="input-mode" value="internal">
        <span>Internal</span>
      </label>
      <label>
        <input type="radio" name="input-mode" value="live-type">
        <span>LiveType</span> <span style="color:#666;font-size:12px">(physical keyboard &rarr; active language)</span>
      </label>
    </div>

    <h2 style="margin-top:18px;">Latin Language</h2>
    <div class="radio-group">
      <label>
        <input type="radio" name="latin-lang" value="en" checked>
        <span>EN</span>
      </label>
      <label>
        <input type="radio" name="latin-lang" value="de">
        <span>DE</span>
      </label>
      <label>
        <input type="radio" name="latin-lang" value="es">
        <span>ES</span>
      </label>
      <label>
        <input type="radio" name="latin-lang" value="fr">
        <span>FR</span>
      </label>
      <label>
        <input type="radio" name="latin-lang" value="it">
        <span>IT</span>
      </label>
    </div>
    <p style="color:#666;font-size:12px;margin:10px 0 0;">
      When a non-EN Latin language is selected and the keyboard is on the Latin side, accented characters compose from digraphs (e.g.&nbsp;DE: <code>ae</code>&rarr;ä, ES: <code>n~</code>&rarr;ñ, FR: <code>e'</code>&rarr;é, IT: <code>a`</code>&rarr;à).
    </p>
  </div>

  <div class="demo-inputs">
    <div>
      <label for="demo-text">Text Input</label>
      <input id="demo-text" type="text" placeholder="Click here, then type on the keyboard below...">
    </div>
    <div>
      <label for="demo-area">Textarea</label>
      <textarea id="demo-area" placeholder="Or click here for multiline input..."></textarea>
    </div>
  </div>

  <div class="event-log" id="event-log">
    <div class="entry" style="color:#555;">Event log...</div>
  </div>

  <bilingual-keyboard enabled-latin-langs="en,de,es,fr,it" latin-lang="en"></bilingual-keyboard>

  <script type="module">
    import '../src/bilingual-keyboard.js';

    const kb = document.querySelector('bilingual-keyboard');
    const log = document.getElementById('event-log');

    function addLog(name, data) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `<span class="evt-name">${name}</span> <span class="evt-data">${JSON.stringify(data)}</span>`;
      log.prepend(div);
      // Keep log at reasonable size
      while (log.children.length > 50) {
        log.removeChild(log.lastChild);
      }
    }

    kb.addEventListener('key-input', (e) => addLog('key-input', e.detail));
    kb.addEventListener('lang-change', (e) => addLog('lang-change', e.detail));
    kb.addEventListener('latin-lang-change', (e) => addLog('latin-lang-change', e.detail));
    kb.addEventListener('visibility-change', (e) => addLog('visibility-change', e.detail));

    // Mode switcher
    document.querySelectorAll('input[name="input-mode"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        kb.setAttribute('input-mode', e.target.value);
        addLog('mode-switch', { mode: e.target.value });
      });
    });

    // Latin language switcher
    document.querySelectorAll('input[name="latin-lang"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        kb.setAttribute('latin-lang', e.target.value);
        addLog('latin-lang', { lang: e.target.value });
      });
    });

    // Keep Latin language radios in sync if the on-keyboard globe button cycles it.
    const latinLangObserver = new MutationObserver(() => {
      const v = kb.getAttribute('latin-lang') || 'en';
      const r = document.querySelector(`input[name="latin-lang"][value="${v}"]`);
      if (r && !r.checked) r.checked = true;
    });
    latinLangObserver.observe(kb, { attributes: true, attributeFilter: ['latin-lang'] });
  </script>

</body>
</html>
