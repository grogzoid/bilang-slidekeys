<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Site — bilang-slidekeys integration</title>
  <style>
    html {
      background: #0d0d1a;
    }
    body {
      margin: 0 auto;
      padding: 32px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      max-width: 700px;
    }
    h1 { color: #7ec8e3; font-size: 26px; margin: 0 0 8px; }
    h2 { color: #aaa; font-size: 16px; margin: 32px 0 12px; font-weight: 500; }
    p { line-height: 1.6; color: #ccc; }
    .form { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
    label { font-size: 14px; color: #888; margin-bottom: 4px; display: block; }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
    }
    textarea { min-height: 120px; resize: vertical; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(126, 200, 227, 0.15);
      color: #7ec8e3;
      font-size: 12px;
      border-radius: 12px;
      letter-spacing: 0.5px;
    }
    code {
      background: #1a1a2e;
      color: #7ec8e3;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h1>Ukrainian Pen Pal — Compose</h1>
<p class="badge">bilang-slidekeys embedded by host page</p>

<p>This is a sample site that has integrated <code>&lt;bilingual-keyboard&gt;</code> directly. Click any input below to start typing — the keyboard slides up from the bottom on demand.</p>

<div class="form">
  <div>
    <label for="recipient">To:</label>
    <input id="recipient" type="text" placeholder="ім'я отримувача...">
  </div>
  <div>
    <label for="subject">Subject:</label>
    <input id="subject" type="text" placeholder="тема листа...">
  </div>
  <div>
    <label for="body">Message:</label>
    <textarea id="body" placeholder="Привіт..."></textarea>
  </div>
</div>

<pre id="error" style="display:none;background:#1a1a2e;padding:12px;border-radius:8px;font-size:13px;color:#f87171;"></pre>

<!-- Embed the bilang-slidekeys component -->
<bilingual-keyboard active-lang="uk" input-mode="bound" enabled-latin-langs="en"></bilingual-keyboard>

<script type="module">
  const errBox = document.getElementById('error');

  // The page must be served over http(s) — relative ES module imports
  // don't work via file://. If that's the case, surface a clear message
  // instead of failing silently.
  if (location.protocol === 'file:') {
    errBox.style.display = 'block';
    errBox.textContent =
      'This page must be served via a local HTTP server (file:// blocks ES module imports).\n' +
      'Run: python3 -m http.server 8801 --directory /path/to/bilingual-keyboard\n' +
      'Then open http://localhost:8801/website/example/index.html';
  } else {
    try {
      // Copy bilingual-keyboard.js + layouts.js to your site, or load
      // from a CDN once published. Here we use the project's src/.
      await import('../../src/bilingual-keyboard.js');
    } catch (err) {
      errBox.style.display = 'block';
      errBox.textContent =
        'IMPORT ERROR: ' + err.message + '\n' +
        'Check that the path ../../src/bilingual-keyboard.js is reachable from ' +
        location.pathname;
    }
  }
</script>

</body>
</html>
